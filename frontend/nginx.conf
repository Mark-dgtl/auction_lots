server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Live-tail логов админки. SSE требует:
    #   - HTTP/1.1
    #   - выключенной буферизации nginx (иначе клиент увидит порции,
    #     а не события)
    #   - длинного proxy_read_timeout (поток может молчать минутами)
    #   - выключенного gzip (чтобы не аккумулировать чанки)
    location = /api/admin/logs/stream {
        proxy_pass http://backend:8000/api/admin/logs/stream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 1h;
        gzip off;
        chunked_transfer_encoding on;
    }

    # Проксируем API на backend, чтобы фронт ходил на тот же origin
    # (решает проблемы с CORS для локальной защиты).
    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_http_version 1.1;
    }
}
