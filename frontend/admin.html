<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AdminPanel — Агрегатор торгов</title>
    <meta name="robots" content="noindex,nofollow">
    <meta name="description" content="Административная панель агрегатора торгов">

    <link rel="stylesheet" href="./css/reset.css">
    <link rel="stylesheet" href="./css/variables.css">
    <link rel="stylesheet" href="./css/base.css">
    <link rel="stylesheet" href="./css/components.css">
    <link rel="stylesheet" href="./css/admin.css">
</head>
<body class="admin-body">

<div class="admin-shell">
    <aside class="admin-sidebar" id="admin-sidebar" aria-label="Навигация админки">
        <a href="#/dashboard" data-route="dashboard">
            <span class="nav-icon" aria-hidden="true">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                     stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="3" width="7" height="9"/>
                    <rect x="14" y="3" width="7" height="5"/>
                    <rect x="14" y="12" width="7" height="9"/>
                    <rect x="3" y="16" width="7" height="5"/>
                </svg>
            </span>
            Dashboard
        </a>
        <a href="#/logs" data-route="logs">
            <span class="nav-icon" aria-hidden="true">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                     stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M4 4h16v4H4zM4 10h16v4H4zM4 16h16v4H4z"/>
                </svg>
            </span>
            Logs
        </a>
        <div class="admin-sidebar-section">Данные</div>
        <a href="#/users" data-route="users">
            <span class="nav-icon" aria-hidden="true">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                     stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/>
                    <circle cx="9" cy="7" r="4"/>
                    <path d="M22 21v-2a4 4 0 0 0-3-3.87"/>
                    <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
                </svg>
            </span>
            Users
        </a>
        <a href="#/lots" data-route="lots">
            <span class="nav-icon" aria-hidden="true">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                     stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="3" width="18" height="18" rx="2"/>
                    <path d="M3 9h18M9 21V9"/>
                </svg>
            </span>
            Lots
        </a>
        <a href="#/outbox" data-route="outbox">
            <span class="nav-icon" aria-hidden="true">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                     stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M22 12h-6l-2 3h-4l-2-3H2"/>
                    <path d="M5.45 5.11L2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"/>
                </svg>
            </span>
            Outbox
        </a>
        <div class="admin-sidebar-section">Сервисы</div>
        <a href="#/parser" data-route="parser">
            <span class="nav-icon" aria-hidden="true">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                     stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"/>
                    <polyline points="12 6 12 12 16 14"/>
                </svg>
            </span>
            Parser
        </a>
        <a href="#/bot" data-route="bot">
            <span class="nav-icon" aria-hidden="true">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                     stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="11" width="18" height="10" rx="2"/>
                    <circle cx="12" cy="5" r="2"/>
                    <path d="M12 7v4M8 16h.01M16 16h.01"/>
                </svg>
            </span>
            Bot
        </a>
        <a href="#/db" data-route="db">
            <span class="nav-icon" aria-hidden="true">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                     stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <ellipse cx="12" cy="5" rx="9" ry="3"/>
                    <path d="M3 5v14a9 3 0 0 0 18 0V5"/>
                    <path d="M3 12a9 3 0 0 0 18 0"/>
                </svg>
            </span>
            DB-консоль
        </a>
    </aside>

    <div class="admin-sidebar-backdrop" id="admin-sidebar-backdrop"></div>

    <header class="admin-topbar">
        <div style="display:flex;align-items:center;gap:var(--space-3)">
            <button type="button" class="admin-burger" id="admin-burger" aria-label="Меню">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                     stroke-width="2" stroke-linecap="round">
                    <line x1="3" y1="6"  x2="21" y2="6"/>
                    <line x1="3" y1="12" x2="21" y2="12"/>
                    <line x1="3" y1="18" x2="21" y2="18"/>
                </svg>
            </button>
            <span class="logo">
                <span class="logo-dot" aria-hidden="true"></span>
                AdminPanel
            </span>
        </div>
        <div class="admin-topbar-right">
            <span class="admin-email" id="admin-email" title=""></span>
            <button type="button" class="btn btn-ghost btn-sm" id="admin-logout">Выйти</button>
        </div>
    </header>

    <main class="admin-content" id="admin-view" aria-live="polite">
        <div class="adm-state">Загрузка…</div>
    </main>
</div>

<script type="module" src="./js/admin/main.js"></script>
</body>
</html>
