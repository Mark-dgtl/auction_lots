name: tenders

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./backend:/app/backend
      - ./parser:/app/parser
      - ./data/lot_images:/app/data/lot_images
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      MEDIA_CACHE_DIR: /app/data/lot_images
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  bot:
    build:
      context: .
      dockerfile: bot/Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - backend
    volumes:
      - ./bot:/app/bot 

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    # Живые правки в `frontend/` без пересборки образа (nginx читает с диска хоста).
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./data/lot_images:/var/cache/lot_images:ro
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  db_data:
